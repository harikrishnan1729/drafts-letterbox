<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vintage Letter Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Signup Page Example -->

<div class="w-full max-w-md border border-black bg-stone-50 shadow-sm mt-16 mx-auto">

    <!-- Newspaper Header -->
    <div class="border-b border-black px-6 py-4 text-center">
      <p class="text-[10px] tracking-[0.3em] uppercase">Est. 1926</p>
      <h1 class="text-3xl font-bold tracking-wide uppercase mt-1">
        The Letter Post
      </h1>
      <p class="text-xs mt-2 uppercase tracking-widest text-neutral-700">
        Archive Your Feelings.
      </p>
    </div>

    <!-- Signup Form -->
    <div class="px-8 py-10">
      <h2 class="text-xl font-bold uppercase tracking-wide mb-8 border-b border-black pb-2">
        Create Account
      </h2>

      <form class="space-y-6">

        <div>
          <label class="block text-xs uppercase tracking-widest mb-2">
            Username
          </label>
          <input
            type="text"
            placeholder="newspaperboy"
            class="w-full border border-black bg-transparent px-4 py-3 outline-none focus:bg-black focus:text-white transition"
          />
        </div>

        <div>
          <label class="block text-xs uppercase tracking-widest mb-2">
            Email Address
          </label>
          <input
            type="email"
            placeholder="you@example.com"
            class="w-full border border-black bg-transparent px-4 py-3 outline-none focus:bg-black focus:text-white transition"
          />
        </div>

        <div>
          <label class="block text-xs uppercase tracking-widest mb-2">
            Password
          </label>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full border border-black bg-transparent px-4 py-3 outline-none focus:bg-black focus:text-white transition"
          />
        </div>

        <button
          type="submit"
          class="w-full border border-black py-3 uppercase tracking-[0.2em] hover:bg-black hover:text-white transition"
        >
          Register
        </button>
      </form>

      <div class="mt-8 text-center text-xs uppercase tracking-widest text-neutral-600">
        <p>
          Already registered?
          <a href="login.html" class="underline hover:text-black">
            Sign In
          </a>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="border-t border-black px-6 py-3 text-center text-[10px] uppercase tracking-[0.25em] text-neutral-600">
      Printed in monochrome.
    </div>

  </div>

</body>
</html>
